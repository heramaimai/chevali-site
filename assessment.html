    <main>
      <section class="page-hero compact">
        <p class="eyebrow">心理测评</p>
        <h1>测评不是给你贴标签，而是帮你更清楚地看见自己。</h1>
        <p class="lead">你可以从情绪、关系、压力和自我探索四个方向开始。结果仅作为自我理解和服务匹配参考，不替代诊断。</p>
      </section>

      <section class="section quiz-panel">
        <div class="quiz-card">
          <span class="tag">3 分钟</span>
          <h2>心马力初始状态问卷</h2>
          <form>
            <label>最近最困扰你的是什么？
              <select>
                <option>情绪低落或焦虑</option>
                <option>亲密关系消耗</option>
                <option>人生方向迷茫</option>
                <option>哀伤失落</option>
                <option>想更理解自己</option>
              </select>
            </label>
            <label>你更希望获得哪种支持？
              <select>
                <option>1v1 个体咨询</option>
                <option>团体支持与成长小组</option>
                <option>先与顾问聊聊</option>
              </select>
            </label>
            <label>你期待咨询带来什么？
              <textarea placeholder="可以简单写下你现在最想被理解的部分"></textarea>
            </label>
            <button class="button primary" type="button">生成初步建议</button>
          </form>
        </div>
      </section>
